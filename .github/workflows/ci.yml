name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test

  version-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check manifest.json and package.json versions match
        run: |
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "manifest.json: $MANIFEST_VERSION"
          echo "package.json:  $PACKAGE_VERSION"
          if [ "$MANIFEST_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::version mismatch between manifest.json ($MANIFEST_VERSION) and package.json ($PACKAGE_VERSION)"
            exit 1
          fi

  bundle:
    runs-on: ubuntu-latest
    needs: [test, version-consistency]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Build .mcpb bundle
        run: npx @anthropic-ai/mcpb pack
      - name: Compute SHA-256
        run: sha256sum *.mcpb
      - uses: actions/upload-artifact@v4
        with:
          name: pennypilot-mcpb
          path: '*.mcpb'
          retention-days: 7
